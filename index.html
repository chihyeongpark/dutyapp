<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <!-- GitHub Pages 등 하위 경로 404 에러 방지용 스크립트 -->
    <script>
        var path = window.location.pathname;
        if (!path.endsWith('/') && path.indexOf('.html') === -1) {
            window.location.replace(window.location.href.split('?')[0] + '/');
        }
    </script>

    <!-- PWA/모바일 최적화 (화면 확대 방지 및 앱 형태 구동) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- 아이콘 및 매니페스트 -->
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">

    <!-- 한글 깨짐 해결용 구글 웹 폰트(Noto Sans KR) 로드 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

    <title>당직 배정 앱</title>

    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f5f5f5;
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
    </style>
</head>
<body>
<!-- 🌟 WasmJS는 skiko.js 없이 메인 js 파일만 로드하면 자동으로 .wasm을 끌어옵니다 -->
<script type="application/javascript" src="dutyapp.js"></script>
</body>
</html>
