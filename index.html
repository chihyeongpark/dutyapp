<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <!-- 🌟 [신규 추가] GitHub Pages 하위 경로 404 에러 방지용 스크립트 -->
    <script>
        var path = window.location.pathname;
        if (!path.endsWith('/') && path.indexOf('.html') === -1) {
            window.location.replace(window.location.href.split('?')[0] + '/');
        }
    </script>

    <!-- 1. PWA/모바일 최적화 (화면 확대 방지 및 앱 형태 구동) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- 2. 아이콘 및 매니페스트 (대소문자 icon 일치) -->
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">

    <!-- 🌟 [한글 깨짐 해결] 구글 웹 폰트(Noto Sans KR) 로드 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

    <title>당직 배정 앱</title>

    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Compose 캔버스가 전체 화면을 덮도록 설정 */
            background-color: #f5f5f5; /* 로딩 전 배경색 */

            /* 🌟 [한글 깨짐 해결] Skia 엔진이 캔버스를 그릴 때 한글 폰트를 기본으로 사용하도록 강제 지정 */
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
    </style>
</head>
<body>
<!--
  Kotlin/JS 플러그인이 빌드된 스크립트(dutyapp.js)를
  body 태그 최하단에 자동으로 주입(inject)하여 실행합니다.
-->
<script src="dutyapp.js"></script>
</body>
</html>
